# AWS SAM / CloudFormation template.
#
# This describes the target production infrastructure documented in
# ARCHITECTURE.md. It has NOT been deployed as part of this project --
# treat it as deployment-ready IaC, not a running system. `sam deploy`
# against this template will create real, billable AWS resources.

AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: >
  Multi-agent fulfillment orchestrator - VPC, ECS/Fargate orchestrator,
  DynamoDB state + idempotency tables, S3 document store, API Gateway
  entry points. IaC only, see ARCHITECTURE.md before deploying.

Parameters:
  Environment:
    Type: String
    Default: dev
    AllowedValues: [dev, staging, prod]

Resources:

  # --- Networking ---
  OrchestratorVPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.42.0.0/16
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: !Sub "orchestrator-vpc-${Environment}"

  PrivateSubnetA:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref OrchestratorVPC
      CidrBlock: 10.42.1.0/24
      AvailabilityZone: !Select [0, !GetAZs ""]

  PrivateSubnetB:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref OrchestratorVPC
      CidrBlock: 10.42.2.0/24
      AvailabilityZone: !Select [1, !GetAZs ""]

  # --- State + idempotency (DynamoDB) ---
  TaskStateTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "orchestrator-task-state-${Environment}"
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: task_id
          AttributeType: S
      KeySchema:
        - AttributeName: task_id
          KeyType: HASH
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true

  FulfillmentIdempotencyTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "fulfillment-idempotency-${Environment}"
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: order_id
          AttributeType: S
      KeySchema:
        - AttributeName: order_id
          KeyType: HASH

  # --- Document store ---
  DocumentBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "orchestrator-documents-${Environment}-${AWS::AccountId}"
      VersioningConfiguration:
        Status: Enabled
      LifecycleConfiguration:
        Rules:
          - Id: ArchiveAfter30Days
            Status: Enabled
            Transitions:
              - TransitionInDays: 30
                StorageClass: GLACIER

  # --- Fulfillment webhook receiver (Lambda, scale-to-zero path) ---
  FulfillmentWebhookFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "fulfillment-webhook-${Environment}"
      Runtime: python3.11
      Handler: app.handler
      CodeUri: ../src/
      Timeout: 10
      MemorySize: 256
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref FulfillmentIdempotencyTable
      Events:
        Webhook:
          Type: Api
          Properties:
            Path: /fulfillment/webhook
            Method: post

  # --- Orchestrator IAM role: only role allowed to write decision log ---
  OrchestratorTaskRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "orchestrator-task-role-${Environment}"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal: { Service: ecs-tasks.amazonaws.com }
            Action: sts:AssumeRole
      Policies:
        - PolicyName: orchestrator-state-write
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:PutItem
                  - dynamodb:GetItem
                  - dynamodb:UpdateItem
                Resource: !GetAtt TaskStateTable.Arn

  # --- Validator subagent IAM role: read-only on documents, nothing else ---
  ValidatorTaskRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "validator-task-role-${Environment}"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal: { Service: ecs-tasks.amazonaws.com }
            Action: sts:AssumeRole
      Policies:
        - PolicyName: validator-read-only
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                Resource: !Sub "${DocumentBucket.Arn}/*"

Outputs:
  DocumentBucketName:
    Value: !Ref DocumentBucket
  TaskStateTableName:
    Value: !Ref TaskStateTable
  WebhookApiUrl:
    Description: Fulfillment webhook endpoint (created only if this stack is deployed)
    Value: !Sub "https://${ServerlessRestApi}.execute-api.${AWS::Region}.amazonaws.com/${Environment}/fulfillment/webhook"
